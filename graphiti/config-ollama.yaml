server:
  transport: "stdio"

llm:
  provider: "openai"
  model: "qwen2.5:7b"
  providers:
    openai:
      api_key: "ollama"
      api_url: "http://localhost:11434/v1"

embedder:
  provider: "openai"
  model: "nomic-embed-text"
